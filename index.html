<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日常サバイバルRPG</title>

<style>

body{
background:#1a1a2e;
color:white;
font-family:sans-serif;
text-align:center;
}

#gameUI{
margin-bottom:10px;
}

canvas{
background:#2b2b45;
border:3px solid white;
}

.bar{
height:14px;
background:#444;
margin:4px 0;
}

.fill{
height:100%;
background:lime;
}

</style>
</head>

<body>

<h2>🧍 日常サバイバルRPG</h2>

<div id="gameUI">

🍞食料<div class="bar"><div id="foodBar" class="fill"></div></div>
💧水<div class="bar"><div id="waterBar" class="fill"></div></div>
😴体力<div class="bar"><div id="energyBar" class="fill"></div></div>

<p>
💰お金 <span id="money">50</span>　
⭐Lv <span id="level">1</span>
</p>

<p>
🌧天気 <span id="weather">晴れ</span>
</p>

</div>

<canvas id="game" width="500" height="400"></canvas>

<p>⌨ 矢印キーで移動</p>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={
x:250,
y:200,
size:20,
speed:3
}

let food=100
let water=100
let energy=100
let money=50
let level=1

let weather="晴れ"

const weathers=["晴れ","雨","嵐"]

const places=[
{name:"コンビニ",x:50,y:50,color:"yellow"},
{name:"公園",x:420,y:60,color:"green"},
{name:"森",x:420,y:320,color:"darkgreen"},
{name:"家",x:60,y:320,color:"orange"}
]

let zombie=null

function spawnZombie(){

if(Math.random()<0.3){

zombie={
x:Math.random()*480,
y:Math.random()*380,
size:20
}

}

}

function draw(){

ctx.clearRect(0,0,500,400)

places.forEach(p=>{
ctx.fillStyle=p.color
ctx.fillRect(p.x,p.y,30,30)

ctx.fillStyle="white"
ctx.fillText(p.name,p.x-10,p.y-5)
})

ctx.fillStyle="cyan"
ctx.fillRect(player.x,player.y,player.size,player.size)

if(zombie){
ctx.fillStyle="red"
ctx.fillRect(zombie.x,zombie.y,20,20)
}

}

function updateBars(){

foodBar.style.width=food+"%"
waterBar.style.width=water+"%"
energyBar.style.width=energy+"%"

document.getElementById("money").textContent=money
document.getElementById("level").textContent=level
document.getElementById("weather").textContent=weather

}

function event(place){

if(place==="コンビニ"){

if(money>=20){
money-=20
food+=20
water+=20
alert("コンビニで買い物した")
}

}

if(place==="公園"){

food+=10
alert("食べ物を見つけた")

}

if(place==="森"){

money+=10
alert("お金を拾った")

}

if(place==="家"){

energy+=20
alert("家で休んだ")

}

}

function checkPlaces(){

places.forEach(p=>{

if(
player.x<p.x+30 &&
player.x+player.size>p.x &&
player.y<p.y+30 &&
player.y+player.size>p.y
){

event(p.name)

}

})

}

function checkZombie(){

if(!zombie) return

if(
player.x<zombie.x+20 &&
player.x+20>zombie.x &&
player.y<zombie.y+20 &&
player.y+20>zombie.y
){

if(Math.random()<0.5){
energy-=20
alert("ゾンビに攻撃された！")
}else{
money+=30
alert("ゾンビを倒した！")
}

zombie=null

}

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp") player.y-=player.speed
if(e.key==="ArrowDown") player.y+=player.speed
if(e.key==="ArrowLeft") player.x-=player.speed
if(e.key==="ArrowRight") player.x+=player.speed

food-=0.1
water-=0.1
energy-=0.1

checkPlaces()
checkZombie()

updateBars()

})

function gameLoop(){

draw()
requestAnimationFrame(gameLoop)

}

setInterval(()=>{

weather=weathers[Math.floor(Math.random()*3)]

spawnZombie()

},5000)

updateBars()

gameLoop()

</script>

</body>
</html>
